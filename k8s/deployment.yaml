apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        # Tu Action debe reemplazar IMAGE_PLACEHOLDER con la URI del ECR
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 8000
        env:
        - name: ENV_NAME
          value: "Produccion"